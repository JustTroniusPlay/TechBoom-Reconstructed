
[client]

	[client.rendering]
		#Render ships with batch rendering mode?
		doBatchRendering = true
		#Auto-disable batch rendering during outline
		disableBatchRenderingDuringOutline = true
		#Batch rendering disabled warning message during outlines
		showOutlineWarningMessage = false
		#Use block lighting for ship?
		useBlockLightingForShip = true

	[client.ship]
		#Should terminal be visible while piloted?
		terminalVisibleWhilePiloted = false
		#Should the helicopter make a hover sound?
		helicopterHoverSound = true
		#Use older & shorter hover sound loop?
		useOldHelicopterHoverSound = false
		#Volume to use for helicopter hover sound
		#Range: 0.0 ~ 150.0
		helicopterHoverSoundVolume = 100.0
		#Volume to use for engine sound
		#Range: 0.0 ~ 150.0
		engineSoundVolume = 100.0
		#Should terminal be interactive while piloted?
		terminalInteractiveWhilePiloted = false
		#Volume to use for drill sound
		#Range: 0.0 ~ 150.0
		drillSoundVolume = 100.0
		#Volume to use for buzzsaw sound
		#Range: 0.0 ~ 150.0
		buzzsawSoundVolume = 100.0
		#Use imperial units for weight?
		useImperialUnits = true
		#Use gradual turning for airships?
		useGradualTurning = true
		#Visual width multiplier for flagship helicopter rotor
		#Range: 0.1 ~ 100.0
		flagshipHelicopterRotorWidthScale = 4.5
		#Visual height multiplier for flagship helicopter rotor
		#Range: 0.1 ~ 100.0
		flagshipHelicopterRotorHeightScale = 2.5
		#Visual width multiplier for flagship propeller
		#Range: 0.1 ~ 100.0
		flagshipPropellerWidthScale = 4.3
		#Visual height multiplier for flagship propeller
		#Range: 0.1 ~ 100.0
		flagshipPropellerHeightScale = 1.7
		#Enable block step-up for constructed ships?
		enableShipStepUp = true

